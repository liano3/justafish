<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just A Fish - Modern</title>
    <script>
        (function() {
            var preferred = localStorage.getItem('preferredMode');
            if (preferred === 'ocean') {
                window.location.replace('index.html');
            }
        })();
    </script>
    <meta name="description" content="Just A Fish - 个人主页，记录，导航">
    <meta name="keywords" content="个人主页,Just A Fish,博客,主页,生活,学习,记录,导航">
    <meta name="author" content="{{PROFILE_NAME}}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Just A Fish">
    <meta property="og:description" content="Just A Fish - 个人主页，记录，导航">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
/* {{INLINE_CSS}} */
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-inner">
                <a href="#" class="logo" onclick="switchPage('home'); return false;">
                    <span class="logo-icon">🐟</span>
                    <span class="logo-text">Just A Fish</span>
                </a>
                <nav class="nav">
                    <button class="nav-link active" data-page="home" onclick="switchPage('home')">首页</button>
                    <button class="nav-link" data-page="bookmarks" onclick="switchPage('bookmarks')">书签</button>
                    <button class="nav-link" data-page="tools" onclick="switchPage('tools')">工具</button>
                    <button class="nav-link" data-page="games" onclick="switchPage('games')">游戏</button>
                </nav>
                <div class="header-actions">
                    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                        <svg class="moon-icon" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </button>
                    <a href="index.html" class="theme-toggle" id="switchToOcean" title="海洋模式">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12c2-2 4-3 6-3s4 1 6 3 4 3 6 3 4-1 6-3"></path><path d="M2 18c2-2 4-3 6-3s4 1 6 3 4 3 6 3 4-1 6-3"></path><path d="M2 6c2-2 4-3 6-3s4 1 6 3 4 3 6 3 4-1 6-3"></path></svg>
                    </a>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="home" class="page active">
                <div class="hero">
                    <div class="hero-avatar">
                        <img src="{{PROFILE_AVATAR}}" alt="Avatar">
                    </div>
                    <h1 class="hero-title">{{PROFILE_NAME}}</h1>
                    <p class="hero-subtitle">{{PROFILE_TITLE}}</p>
                    <p class="hero-slogan">"{{PROFILE_SLOGAN}}"</p>
                    <div class="hero-links">
                        {{HERO_LINKS}}
                    </div>
                </div>

                <div class="container">
                    <h2 class="section-title">最新动态</h2>
                    <div class="announcement-list">
                        {{ANNOUNCEMENTS}}
                    </div>
                </div>
            </div>

            <div id="bookmarks" class="page">
                <div class="container">
                    <div class="section-header">
                        <h2 class="section-title">我的书签</h2>
                    </div>
                    <div class="bookmark-categories" id="bookmarkCategories">
                        {{BOOKMARKS}}
                    </div>
                </div>
            </div>

            <div id="tools" class="page">
                <div class="container">
                    <div class="section-header">
                        <h2 class="section-title">实用工具</h2>
                    </div>
                    <div class="tools-grid">
                        <div class="tool-card">
                            <div class="tool-header">
                                <div class="tool-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                </div>
                                <h3 class="tool-title">时钟</h3>
                            </div>
                            <div class="tool-body">
                                <div class="clock-display">
                                    <div class="clock-time" id="digitalClock">00:00:00</div>
                                    <div class="clock-date" id="digitalDate">2024年1月1日 星期一</div>
                                    <div class="analog-clock">
                                        <div class="analog-face" id="analogFace">
                                            <div class="analog-center"></div>
                                            <div class="analog-hand analog-hour" id="analogHour"></div>
                                            <div class="analog-hand analog-minute" id="analogMinute"></div>
                                            <div class="analog-hand analog-second" id="analogSecond"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="tool-card">
                            <div class="tool-header">
                                <div class="tool-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
                                </div>
                                <h3 class="tool-title">番茄钟</h3>
                            </div>
                            <div class="tool-body">
                                <div class="pomodoro-display">
                                    <div class="pomodoro-progress">
                                        <svg width="180" height="180" viewBox="0 0 180 180">
                                            <circle class="pomodoro-progress-bg" cx="90" cy="90" r="85"></circle>
                                            <circle class="pomodoro-progress-bar" id="pomodoroProgress" cx="90" cy="90" r="85" stroke-dasharray="534" stroke-dashoffset="0"></circle>
                                        </svg>
                                    </div>
                                    <div class="pomodoro-timer" id="pomodoroTimer">25:00</div>
                                    <div class="pomodoro-status" id="pomodoroStatus">准备专注</div>
                                    <div class="pomodoro-controls">
                                        <button class="pomodoro-btn pomodoro-btn-primary" id="pomodoroStart">开始</button>
                                        <button class="pomodoro-btn pomodoro-btn-secondary" id="pomodoroReset">重置</button>
                                    </div>
                                    <div class="pomodoro-settings">
                                        <div class="pomodoro-setting">
                                            <span>专注</span>
                                            <input type="number" id="pomodoroWork" value="25" min="1" max="60">
                                            <span>分钟</span>
                                        </div>
                                        <div class="pomodoro-setting">
                                            <span>休息</span>
                                            <input type="number" id="pomodoroBreak" value="5" min="1" max="30">
                                            <span>分钟</span>
                                        </div>
                                    </div>
                                    <div class="pomodoro-stats">
                                        <span>完成 <strong id="pomodoroCount">0</strong> 次</span>
                                        <span>累计 <strong id="pomodoroTotal">0</strong> 分钟</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="games" class="page">
                <div class="container">
                    <div class="section-header">
                        <h2 class="section-title">小游戏</h2>
                    </div>
                    <div class="tools-grid">
                        <div class="tool-card">
                            <div class="tool-header">
                                <div class="tool-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                                </div>
                                <h3 class="tool-title">舒尔特方格</h3>
                            </div>
                            <div class="tool-body">
                                <div class="schulte-info">
                                    <div class="schulte-stat">
                                        <div class="schulte-stat-value" id="schulteTime">0.00</div>
                                        <div class="schulte-stat-label">当前用时(秒)</div>
                                    </div>
                                    <div class="schulte-stat">
                                        <div class="schulte-stat-value" id="schulteBest">-</div>
                                        <div class="schulte-stat-label">最佳记录</div>
                                    </div>
                                </div>
                                <div class="schulte-grid-wrapper">
                                    <div class="schulte-overlay" id="schulteOverlay">点击开始</div>
                                    <div class="schulte-grid" id="schulteGrid"></div>
                                </div>
                                <div class="schulte-controls">
                                    <button class="pomodoro-btn pomodoro-btn-primary" id="schulteRestart">重新开始</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2024 <a href="#">Just A Fish</a> · Made with ❤️</p>
        </footer>

        <nav class="mobile-nav">
            <button class="mobile-nav-link active" data-page="home" onclick="switchPage('home')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                首页
            </button>
            <button class="mobile-nav-link" data-page="bookmarks" onclick="switchPage('bookmarks')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                书签
            </button>
            <button class="mobile-nav-link" data-page="tools" onclick="switchPage('tools')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                工具
            </button>
            <button class="mobile-nav-link" data-page="games" onclick="switchPage('games')">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                游戏
            </button>
        </nav>
    </div>

    <script>
/* {{INLINE_JS}} */
    </script>
</body>
</html>
